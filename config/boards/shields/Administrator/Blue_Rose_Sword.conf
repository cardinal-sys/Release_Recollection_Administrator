# =================================================
# Blue_Rose_Sword.conf — 〈青薔薇の剣〉左手・peripheral
#   Cardinal版 Dark_Repulser.conf を継承 + EC11 設定
# =================================================

# BLE表示名
CONFIG_ZMK_KEYBOARD_NAME="Blue Rose Sword"

# NFC ピンを GPIO として使用
CONFIG_NFCT_PINS_AS_GPIOS=y

# 〈Reflex Boost〉— キースキャンデバウンス短縮
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Bluetooth 接続の基本設定
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# 左右同期方針: central 側 ZMK_BLE_PROFILE_COUNT=5 化に合わせて 6/6 へ追従
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_AUTO_PHY_UPDATE=y
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# 〈Bandwidth Surge〉— BLE TX/RX バッファ増量
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_EVT_RX_COUNT=16

# 接続パラメータの同期（右側 Night_Sky_Sword と完全一致）
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=1000
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=1000
# 接続インターバル範囲: Central と完全一致 (MIN 7.5ms / MAX 15ms / Apple HID 互換上限)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# スプリット接続パラメータ（Left-Right 間）
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=1000

# スリープ・Insomnia設定
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_INSOMNIA_PING_INTERVAL=3000
CONFIG_ZMK_INSOMNIA_PING_ON_START=y

# 通信スタックの有効化（ポインティング・マウス）
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Rotary encoder（左手専用 EC11）
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y
CONFIG_EC11_THREAD_PRIORITY=14
CONFIG_EC11_THREAD_STACK_SIZE=4096

# バッテリー・システム設定
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Boot Retention
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# ログサブシステム
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=y
